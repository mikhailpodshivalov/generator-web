name: Deploy Cloudflare Pages

on:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_PAGES_PROJECT: mgen-fun
      CF_PAGES_BRANCH: main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Generate audio manifest
        run: ./scripts/generate-audio-manifest.sh
      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN is missing in GitHub secrets"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_ACCOUNT_ID is missing in GitHub secrets"
            exit 1
          fi
      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          echo "Checking Pages projects for: ${CF_PAGES_PROJECT}"
          if npx --yes wrangler@4 pages project list | grep -Fq "${CF_PAGES_PROJECT}"; then
            echo "Pages project '${CF_PAGES_PROJECT}' already exists."
          else
            echo "Pages project '${CF_PAGES_PROJECT}' not found. Creating it now."
            npx --yes wrangler@4 pages project create "${CF_PAGES_PROJECT}" --production-branch="${CF_PAGES_BRANCH}"
          fi
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy . --project-name="${CF_PAGES_PROJECT}" --branch="${CF_PAGES_BRANCH}" --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
